            onRemove: function (map) { map.getPanes().overlayPane.removeChild(this._canvas); },
            _update: function () {
                if(!this._map) return;
                const size = this._map.getSize(); this._canvas.width = size.x; this._canvas.height = size.y;

                });

                    let content = await file.text(); let match;
                    while ((match = regex.exec(content)) !== null) {
                        let lat = match[1] ? parseFloat(match[1]) : parseInt(match[3])/1e7;
                        let lng = match[2] ? parseFloat(match[2]) : parseInt(match[4])/1e7;
                        fogGrid.add(lat.toFixed(3) + ',' + lng.toFixed(3));
                        countryGrid.add(lat.toFixed(1) + ',' + lng.toFixed(1));
                    }
                }
                const fogData = Array.from(fogGrid).map(s => s.split(',').map(Number));
                self.postMessage({ fogData, countryData: Array.from(countryGrid) });
            };
        `;
        const worker = new Worker(URL.createObjectURL(new Blob([workerScript])));

        document.getElementById('upload').onchange = (e) => {
            if (!e.target.files.length) return;
            document.getElementById('status').textContent = "🚀 正在解析軌跡...";
            worker.postMessage(Array.from(e.target.files));
        };

        worker.onmessage = (e) => {
            const { fogData, countryData } = e.data;
            if (fogData.length) {
                new L.FogLayer(fogData).addTo(map);
                map.flyToBounds(L.latLngBounds(fogData), { padding: [50, 50] });
                compressedCountryPoints = countryData;
                if (isDatabaseReady) autoCalculate();
                else document.getElementById('btn-calc').disabled = false;
                document.getElementById('status').textContent = "✅ 迷霧已清除！";
            }
        };

        document.getElementById('btn-calc').onclick = autoCalculate;

        function autoCalculate() {
            if (!isDatabaseReady) return;
            const countryBox = document.getElementById('countries-list');
            countryBox.textContent = "⏳ 結算中...";
            const visited = {}; const found = new Set();
            compressedCountryPoints.forEach(c => {
                const [lat, lng] = c.split(',').map(Number);
                const pt = turf.point([lng, lat]);
                for (let f of worldGeoJSON.features) {
                    const name = f.properties.name;
                    if (!found.has(name) && turf.booleanPointInPolygon(pt, f)) {
                        found.add(name);
                        const info = countryInfoDB[name] || countryInfoDB[f.id] || { name, region: "其他", flag: "🏳️" };
                        if (!visited[info.region]) visited[info.region] = [];
                        visited[info.region].push({ label: info.flag + " " + info.name, feature: f });
                        break;
                    }
                }
            });
            document.getElementById('total-countries').textContent = found.size;
            countryBox.innerHTML = "";
            Object.keys(visited).sort().forEach(reg => {
                const div = document.createElement('div'); div.className = "region-group";
                div.innerHTML = `<div class="region-title">${regionTranslator[reg] || reg}</div><div></div>`;
                visited[reg].sort((a,b) => a.label.localeCompare(b.label)).forEach(item => {
                    const span = document.createElement('span'); span.className = "country-tag"; span.textContent = item.label;
                    span.onclick = () => map.flyToBounds(L.geoJSON(item.feature).getBounds());
                    div.lastChild.appendChild(span);
                });
                countryBox.appendChild(div);
            });
        }
    </script>
</body>
